<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Bayu</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f4f4;
        }

        /* Navbar */
        .navbar {
            background: #222;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 20px;
        }

        /* Running text modern */
        .running-text {
            width: 100%;
            overflow: hidden;
            background: yellow;
        }

        .running-text p {
            display: inline-block;
            white-space: nowrap;
            padding-left: 100%;
            animation: jalan 10s linear infinite;
            margin: 0;
            padding: 10px;
            font-weight: bold;
        }

        @keyframes jalan {
            from {
                transform: translateX(250%);
            }

            to {
                transform: translateX(-100%);
            }
        }

        /* Konten */
        h1 {
            text-align: center;
            margin-top: 20px;
        }

        .container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        img {
            width: 150px;
            border-radius: 10px;
        }

        a {
            text-decoration: none;
            color: black;
        }
    </style>
</head>

<body>

    <div class="navbar">
        📷 Website Kamera Smartphone
    </div>

    <div class="running-text">
        <p>🔥 Selamat datang! Pilih brand kamera favorit kamu!</p>
    </div>

    <h1>Pilih Brand</h1>

    <div class="container">

        <div class="card">
            <a href="artikel1.html">
                <img src="img/leica.png">
                <p>Leica</p>
            </a>
        </div>

        <div class="card">
            <a href="artikel2.html">
                <img src="img/zeiss.png">
                <p>Zeiss</p>
            </a>
        </div>

        <div class="card">
            <a href="artikel3.html">
                <img src="img/hasselblad.png">
                <p>Hasselblad</p>
            </a>
        </div>

        <div class="card">
            <a href="artikel4.html">
                <img src="img/sony.png">
                <p>Sony</p>
            </a>
        </div>

    </div>

    <!-- Bootstrap JavaScript via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
